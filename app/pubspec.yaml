name: app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.8
resolution: workspace

dependencies:
  flutter:
    sdk: flutter

  # local packages
  network:
    path: ../packages/core/network
  navigation:
    path: ../packages/navigation
  data:
    path: ../packages/core/data
  domain:
    path: ../packages/core/domain
  auth_domain:
    path: ../packages/domains/auth
  product_domain:
    path: ../packages/domains/product
  auth_data:
    path: ../packages/data/auth
  product_data:
    path: ../packages/data/product
  sign_in:
    path: ../packages/features/sign_in
  sign_up:
    path: ../packages/features/sign_up
  main:
    path: ../packages/features/main
  home:
    path: ../packages/features/main/home
  profile:
    path: ../packages/features/main/profile
  auto_route:
  injectable:
  get_it:

dev_dependencies:
  build_runner:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  auto_route_generator:
  injectable_generator:
  flutter_flavorizr: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - shorebird.yaml
